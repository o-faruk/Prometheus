services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: prometheus-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prometheus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prometheus}
      POSTGRES_DB: ${POSTGRES_DB:-prometheus}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./backend/app/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prometheus}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  timescale_data:
